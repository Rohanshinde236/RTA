  rta:  "India (Client ProSupport IND)"
  cn:   "China (Client ProSupport CHN)"
  au:   "Australia (Client ProSupport AUS)"
  emea: "EMEA (Europe — Germany, France, Spain, Italy, Netherlands, Poland)"
  hk:   "Hong Kong (Client ProSupport HKG)"
  my:   "Malaysia (Client ProSupport MYS)"
  kr:   "Korea (Client ProSupport KOR)"
  th:   "Thailand (Client ProSupport THA)"
  br:   "Brazil (Client ProSupport BRA)"
  tw:   "Taiwan (Client ProSupport TWN)"

