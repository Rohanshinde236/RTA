# ============================================================
# RTA SYSTEM RULES — MASTER RULEBOOK
# ============================================================
# This file is the SINGLE SOURCE OF TRUTH for all business,
# operational, and chatbot rules across the entire system.
#
# Used by:
#   - prompt_loader.py   → injects {rules} into every LLM prompt
#   - workflow.py        → reads routing/lever/recovery thresholds
#   - agent4_cms_monitor.py → reads AHT/AUX/ACW thresholds
#   - chatbot (app.py)   → reads formatting + SQL rules
#
# To change any rule: edit this file only. No code changes needed.
# ============================================================


# ─────────────────────────────────────────────────────────────
# SECTION 1 — REGION & SKILL REFERENCE
# ─────────────────────────────────────────────────────────────
